<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δελτίο εθνικών θεμάτων</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap&subset=greek" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --paper:#EDF3F4; --ink:#12303E; --shallow:#C9DCE0; --panel:#F7FAFB;
    --buoy:#B3372B; --amber:#C07C1F; --teal:#167D7F; --muted:#5B7480;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.55}
  .wrap{max-width:880px;margin:0 auto;padding:20px 16px 60px}

  /* Masthead */
  header{border-bottom:3px double var(--ink);padding-bottom:14px;margin-bottom:14px}
  h1{font-family:'Literata',serif;font-weight:700;font-size:clamp(22px,4.5vw,32px);
     letter-spacing:.02em}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-top:4px}

  /* Signal strip — 24ωρη εικόνα σοβαρότητας */
  .strip{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
  .sig{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 10px;
       border:1px solid var(--shallow);background:var(--panel);border-radius:2px}
  .sig b{font-weight:500}
  .sig.hot{border-color:var(--buoy);color:var(--buoy)}

  /* Filters */
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .chip{font-size:13px;padding:5px 12px;border:1px solid var(--shallow);
        background:var(--panel);border-radius:16px;cursor:pointer;color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  input[type=search]{width:100%;margin:8px 0 18px;padding:9px 12px;font-size:14px;
      font-family:inherit;border:1px solid var(--shallow);border-radius:2px;
      background:var(--panel);color:var(--ink)}
  input[type=search]:focus{outline:2px solid var(--teal)}
  select{font-size:13px;padding:5px 10px;border:1px solid var(--shallow);
      border-radius:2px;background:var(--panel);color:var(--ink);
      font-family:inherit;margin-bottom:6px}
  select:focus{outline:2px solid var(--teal)}
  .digest{background:var(--panel);border:1px solid var(--shallow);
      border-left:4px solid var(--teal);border-radius:2px;
      padding:12px 14px;margin:0 0 16px}
  .digest summary{cursor:pointer;font-family:'IBM Plex Mono',monospace;
      font-size:12.5px;color:var(--teal);font-weight:500;letter-spacing:.03em}
  .digest-text{white-space:pre-wrap;font-size:14px;margin-top:10px}

  /* Dispatch cards */
  .card{background:var(--panel);border:1px solid var(--shallow);
        border-left:4px solid var(--shallow);border-radius:2px;
        padding:12px 14px;margin-bottom:10px}
  .card.s3{border-left-color:var(--amber)}
  .card.s4,.card.s5{border-left-color:var(--buoy)}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);
        display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .sev{font-weight:500}
  .s3 .sev{color:var(--amber)} .s4 .sev,.s5 .sev{color:var(--buoy)}
  .card h2{font-size:16px;font-weight:600;line-height:1.35;margin-bottom:5px}
  .card h2 a{color:var(--ink);text-decoration:none}
  .card h2 a:hover{color:var(--teal);text-decoration:underline}
  .sum{font-size:14px;margin-bottom:6px}
  .angle{font-size:13px;color:var(--teal);border-top:1px dashed var(--shallow);
         padding-top:6px;margin-top:6px}
  .angle::before{content:"ΓΩΝΙΑ → ";font-family:'IBM Plex Mono',monospace;
                 font-size:11px;color:var(--muted)}
  .flag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
        color:var(--buoy);border:1px solid var(--buoy);padding:1px 6px;
        border-radius:2px;margin-left:6px;vertical-align:1px}
  .corrob{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
        color:var(--teal);border:1px solid var(--teal);padding:1px 6px;
        border-radius:2px;margin-left:6px;vertical-align:1px}
  .empty{text-align:center;color:var(--muted);padding:50px 0;
         font-family:'IBM Plex Mono',monospace;font-size:13px}
  .viewToggle{display:flex;gap:6px;margin-bottom:10px}
  .viewToggle button{font-size:13px;padding:6px 14px;border:1px solid var(--shallow);
        background:var(--panel);border-radius:16px;cursor:pointer;color:var(--ink);
        font-family:inherit}
  .viewToggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  #mapView{display:none;height:520px;border:1px solid var(--shallow);
        border-radius:2px;margin-bottom:14px;background:var(--panel)}
  .leaflet-popup-content{font-family:'IBM Plex Sans',sans-serif;font-size:13px;max-width:240px}
  .leaflet-popup-content b{display:block;margin-bottom:4px}
  .leaflet-popup-content a{color:var(--teal)}
  .pin-count{background:var(--ink);color:var(--paper);border-radius:50%;
        width:26px;height:26px;display:flex;align-items:center;justify-content:center;
        font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
  @media (prefers-reduced-motion:no-preference){
    .card{transition:border-left-color .15s}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Δελτίο εθνικών θεμάτων</h1>
    <div class="stamp" id="stamp">ΦΟΡΤΩΣΗ…</div>
  </header>

  <div class="strip" id="strip"></div>
  <details class="digest" id="digestBox" style="display:none" open>
    <summary id="digestTitle">ΠΡΩΙΝΟ ΔΕΛΤΙΟ</summary>
    <div class="digest-text" id="digestText"></div>
  </details>

  <div class="filters" id="catFilters"></div>
  <div class="filters" id="sevFilters"></div>
  <select id="srcSel" aria-label="Φίλτρο πηγής"></select>
  <input type="search" id="q" placeholder="Αναζήτηση σε τίτλους και συνόψεις…" aria-label="Αναζήτηση">

  <div class="viewToggle">
    <button id="btnListView" class="on">☰ Λίστα</button>
    <button id="btnMapView">🗺 Χάρτης</button>
  </div>
  <div id="mapView"></div>
  <div id="list"><div class="empty">ΦΟΡΤΩΣΗ ΔΕΔΟΜΕΝΩΝ…</div></div>
</div>

<script>
let items = [], activeCat = null, minSev = 3, query = "", activeSrc = null;
let currentView = "list", leafletMap = null, markerLayer = null;

const fmt = iso => {
  const d = new Date(iso);
  return d.toLocaleString("el-GR",{day:"2-digit",month:"2-digit",
    hour:"2-digit",minute:"2-digit"});
};

function filteredItems(){
  const q = query.toLowerCase();
  return items.filter(it =>
    (!activeCat || it.category === activeCat) &&
    (!activeSrc || it.source === activeSrc) &&
    (it.severity >= minSev) &&
    (!q || (it.title + " " + (it.summary_el||"")).toLowerCase().includes(q))
  );
}

const SEV_COLOR = {1:"#5B7480", 2:"#5B7480", 3:"#C07C1F", 4:"#B3372B", 5:"#B3372B"};

function ensureMap(){
  if(leafletMap) return;
  leafletMap = L.map("mapView").setView([37.5, 27.5], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap",
    maxZoom: 18,
  }).addTo(leafletMap);
  markerLayer = L.layerGroup().addTo(leafletMap);
}

function renderMap(shown){
  ensureMap();
  markerLayer.clearLayers();
  // Ομαδοποίηση θεμάτων ανά τοποθεσία, ώστε πολλά άρθρα στο ίδιο σημείο
  // να μη στοιβάζονται αόρατα το ένα πάνω στο άλλο.
  const byLoc = new Map();
  shown.forEach(it => {
    (it.locations || []).forEach(loc => {
      const key = loc.name;
      if(!byLoc.has(key)) byLoc.set(key, {loc, arts: []});
      byLoc.get(key).arts.push(it);
    });
  });
  byLoc.forEach(({loc, arts}) => {
    const maxSev = Math.max(...arts.map(a=>a.severity));
    const color = SEV_COLOR[maxSev] || "#5B7480";
    const marker = L.circleMarker([loc.lat, loc.lon], {
      radius: 8 + Math.min(arts.length, 6),
      color, fillColor: color, fillOpacity: 0.75, weight: 2,
    }).addTo(markerLayer);
    const list = arts.slice(0, 6).map(a =>
      `<div style="margin-bottom:6px"><b>ΣΟΒ${a.severity}</b> · ${a.source}<br>
       <a href="${a.link}" target="_blank" rel="noopener">${a.title.slice(0,90)}</a></div>`
    ).join("");
    marker.bindPopup(`<b>${loc.name} (${arts.length} θέμα${arts.length>1?'τα':''})</b>${list}
      ${arts.length>6 ? `<div style="color:var(--muted)">+${arts.length-6} ακόμα</div>` : ""}`);
  });
}

function setView(view){
  currentView = view;
  document.getElementById("btnListView").classList.toggle("on", view==="list");
  document.getElementById("btnMapView").classList.toggle("on", view==="map");
  document.getElementById("list").style.display = view==="list" ? "" : "none";
  document.getElementById("mapView").style.display = view==="map" ? "block" : "none";
  if(view==="map"){
    renderMap(filteredItems());
    setTimeout(()=>{ if(leafletMap) leafletMap.invalidateSize(); }, 50);
  }
}

document.getElementById("btnListView").onclick = () => setView("list");
document.getElementById("btnMapView").onclick = () => setView("map");

function render(){
  const list = document.getElementById("list");
  const shown = filteredItems();
  if(currentView === "map"){
    renderMap(shown);
  }
  if(!shown.length){
    list.innerHTML = '<div class="empty">ΚΑΝΕΝΑ ΑΠΟΤΕΛΕΣΜΑ ΜΕ ΑΥΤΑ ΤΑ ΦΙΛΤΡΑ</div>';
    return;
  }
  list.innerHTML = shown.map(it => `
    <article class="card s${it.severity}">
      <div class="meta">
        <span>${fmt(it.published)}</span>
        <span>${it.source}</span>
        <span>${it.category||""}</span>
        <span class="sev">ΣΟΒ ${it.severity}/5</span>
      </div>
      <h2><a href="${it.link}" target="_blank" rel="noopener">${it.title}</a>${
        it.turkish_narrative ? '<span class="flag">ΤΟΥΡΚΙΚΟ ΑΦΗΓΗΜΑ</span>' : ''}${
        it.corroborated_by && it.corroborated_by.length
          ? `<span class="corrob" title="${it.corroborated_by.join(', ')}">✓ ΕΠΙΒΕΒΑΙΩΝΕΤΑΙ ΑΠΟ ${it.corroborated_by.length} ΑΚΟΜΑ</span>`
          : ''}</h2>
      <div class="sum">${it.summary_el||""}${
        it.locations && it.locations.length
          ? ` <span style="color:var(--teal);font-size:12px">📍 ${it.locations.map(l=>l.name).join(', ')}</span>`
          : ''}</div>
      ${it.angle ? `<div class="angle">${it.angle}</div>` : ""}
    </article>`).join("");
}

function buildFilters(){
  const cats = [...new Set(items.map(i=>i.category).filter(Boolean))].sort();
  const cf = document.getElementById("catFilters");
  cf.innerHTML = ['<button class="chip on" data-c="">Όλα</button>']
    .concat(cats.map(c=>`<button class="chip" data-c="${c}">${c}</button>`)).join("");
  cf.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    cf.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); activeCat = b.dataset.c || null; render();
  });

  const sf = document.getElementById("sevFilters");
  sf.innerHTML = [1,3,4].map(s=>`<button class="chip ${s===3?'on':''}" data-s="${s}">${
    s===1?'Κάθε σοβαρότητα':'ΣΟΒ ≥ '+s}</button>`).join("");
  sf.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    sf.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); minSev = +b.dataset.s; render();
  });

  const srcs = [...new Set(items.map(i=>i.source))].sort((a,b)=>a.localeCompare(b,"el"));
  const sel = document.getElementById("srcSel");
  sel.innerHTML = '<option value="">Όλες οι πηγές</option>' +
    srcs.map(s=>`<option value="${s}">${s}</option>`).join("");
  sel.onchange = () => { activeSrc = sel.value || null; render(); };

  document.getElementById("q").oninput = e => { query = e.target.value; render(); };
}

function buildStrip(){
  const dayAgo = Date.now() - 86400000;
  const recent = items.filter(i => new Date(i.published) > dayAgo);
  const hi = recent.filter(i=>i.severity>=4).length;
  const md = recent.filter(i=>i.severity===3).length;
  document.getElementById("strip").innerHTML =
    `<span class="sig">24Ω: <b>${recent.length}</b> ΣΗΜΑΤΑ</span>` +
    `<span class="sig">ΣΟΒ 3: <b>${md}</b></span>` +
    `<span class="sig ${hi?'hot':''}">ΣΟΒ 4-5: <b>${hi}</b></span>`;
}

fetch("data/digest.json?t=" + Date.now())
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if(!d || !d.text) return;
    const age = Date.now() - new Date(d.generated).getTime();
    if(age > 36*3600*1000) return; // μπαγιάτικο δελτίο δεν εμφανίζεται
    document.getElementById("digestTitle").textContent =
      "ΠΡΩΙΝΟ ΔΕΛΤΙΟ — " + fmt(d.generated);
    document.getElementById("digestText").textContent = d.text;
    document.getElementById("digestBox").style.display = "block";
  })
  .catch(()=>{});

fetch("data/items.json?t=" + Date.now())
  .then(r => r.json())
  .then(d => {
    items = d.items || [];
    document.getElementById("stamp").textContent =
      "ΕΝΗΜΕΡΩΣΗ " + fmt(d.updated) + " · " + items.length + " ΚΑΤΑΧΩΡΙΣΕΙΣ";
    buildStrip(); buildFilters(); render();
  })
  .catch(() => {
    document.getElementById("list").innerHTML =
      '<div class="empty">ΔΕΝ ΒΡΕΘΗΚΕ ΤΟ data/items.json — ΤΡΕΞΕ ΠΡΩΤΑ ΤΟΝ AGENT</div>';
  });
</script>
</body>
</html>
